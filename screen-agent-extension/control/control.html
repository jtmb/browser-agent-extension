<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen Agent — Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
    h1 { font-size: 1.2em; margin-bottom: 10px; }
    .status { padding: 8px 12px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9em; }
    .status.connected { background: #1b5e20; color: #a5d6a7; }
    .status.disconnected { background: #4a1a1a; color: #ef9a9a; }
    .section { margin-bottom: 20px; }
    .section h2 { font-size: 1em; margin-bottom: 8px; color: #90caf9; }
    textarea { width: 100%; min-height: 80px; background: #16213e; color: #e0e0e0; border: 1px solid #333; border-radius: 6px; padding: 10px; font-family: 'Cascadia Code', monospace; font-size: 0.85em; resize: vertical; }
    button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85em; margin-right: 6px; margin-top: 6px; }
    .btn-primary { background: #1565c0; color: white; }
    .btn-primary:hover { background: #1976d2; }
    .btn-secondary { background: #333; color: #ccc; }
    .btn-secondary:hover { background: #444; }
    .btn-danger { background: #c62828; color: white; }
    .btn-danger:hover { background: #d32f2f; }
    .shortcuts { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .shortcuts button { font-size: 0.78em; padding: 4px 10px; }
    #output { background: #0d1117; border: 1px solid #333; border-radius: 6px; padding: 12px; min-height: 200px; max-height: 500px; overflow-y: auto; font-family: 'Cascadia Code', monospace; font-size: 0.82em; white-space: pre-wrap; }
    .entry { border-bottom: 1px solid #222; padding: 4px 0; }
    .entry .ts { color: #555; }
    .entry .ok { color: #4caf50; }
    .entry .err { color: #ef5350; }
  </style>
</head>
<body>
  <h1>🖥️ Screen Agent — Direct Control</h1>
  <div id="status" class="status disconnected">Disconnected — waiting for extension...</div>

  <div class="section">
    <h2>Command</h2>
    <textarea id="cmd" placeholder='{"action":"get_elements"}'>{"action":"get_elements"}</textarea>
    <div class="shortcuts">
      <button onclick="setCmd('get_elements')">Get Elements</button>
      <button onclick="setCmd('screenshot')">Screenshot</button>
      <button onclick="setCmd('click_element', 0)">Click [0]</button>
      <button onclick="setCmd('click_element', 1)">Click [1]</button>
      <button onclick="setCmd('click_element', 2)">Click [2]</button>
      <button onclick="setCmd('click_coords', 500, 300)">Click (500,300)</button>
      <button onclick="setCmd('scroll', 500)">Scroll ↓500</button>
      <button onclick="setCmd('navigate', 'https://youtube.com')">→ YouTube</button>
      <button onclick="setCmd('wait', 1000)">Wait 1s</button>
    </div>
    <button class="btn-primary" onclick="sendCmd()">Send</button>
    <button class="btn-secondary" onclick="clearOutput()">Clear Output</button>
  </div>

  <div class="section">
    <h2>Output</h2>
    <div id="output"></div>
  </div>

  <script src="control.js"></script>
</body>
</html>
