<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Agent — Click Test Harness</title>
<!--
  Test Harness for Screen Agent Chrome Extension
  ─────────────────────────────────────────────
  Purpose: Allows testing the extension's tool execution API without the LLM.
  Connects via chrome.runtime.connectExternal to the extension's externally_connectable
  API, sending direct action messages (get_elements, screenshot, click_element, click_coords).

  How to use:
    1. Serve this file from localhost (e.g., python3 -m http.server 9876)
    2. Open http://localhost:9876/test-harness.html in Chrome
    3. Find the Screen Agent extension ID from chrome://extensions
    4. Click "Connect to Extension" and paste the ID
    5. Navigate to a test page (e.g., lichess.org/analysis) in another tab
    6. Use the buttons to test individual tools or run the full test suite

  Architecture:
    The extension's externally_connectable API (background.js lines 114-185) accepts
    { action: "tool_name", ...args } messages and returns { ok: true/false, ...result }.
    The extension attaches/detaches the debugger per-request, so the active tab must
    be the page you want to interact with.
-->
<style>
  body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; max-width: 800px; margin: 0 auto; }
  h1 { color: #7b68ee; }
  .log { background: #0d0d1a; border-radius: 8px; padding: 16px; min-height: 300px; max-height: 600px; overflow-y: auto; white-space: pre-wrap; font-size: 13px; line-height: 1.5; }
  .entry { margin: 4px 0; padding: 4px 8px; border-radius: 4px; }
  .entry.info { background: #1a3a5c; }
  .entry.success { background: #1a5c2a; }
  .entry.error { background: #5c1a1a; }
  button { background: #7b68ee; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 8px 4px; }
  button:hover { background: #6a5acd; }
  button:disabled { background: #444; cursor: not-allowed; }
  .status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
  .status.connected { background: #4caf50; }
  .status.disconnected { background: #f44336; }
</style>
</head>
<body>
<h1>🧪 Screen Agent — Click Test Harness</h1>
<p>
  <span class="status disconnected" id="statusDot"></span>
  <strong id="statusText">Disconnected</strong>
  &mdash; Extension ID: <code id="extId">(unknown)</code>
</p>

<div id="controls">
  <button id="btnConnect" onclick="connect()">🔌 Connect to Extension</button>
  <button id="btnGetElements" onclick="getElements()" disabled>📋 Get Elements</button>
  <button id="btnScreenshot" onclick="takeScreenshot()" disabled>📸 Screenshot</button>
  <button id="btnClick" onclick="clickChessPiece()" disabled>👆 Click e2 Pawn (coord)</button>
  <button id="btnRunAll" onclick="runFullTest()" disabled>▶️ Run Full Test</button>
</div>

<h3>Log</h3>
<div class="log" id="log"><div class="entry info">Waiting for connection…</div></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────

/** Chrome runtime port to the Screen Agent extension. Set by connect(). */
let port = null;

/** Whether we have an active connection to the extension. */
let connected = false;

// ── Logging ────────────────────────────────────────────────────────────────

/**
 * Append a timestamped entry to the on-page log.
 *
 * @param {string} msg  - Text to display.
 * @param {string} type - CSS class suffix: 'info' (blue), 'success' (green), 'error' (red).
 */
function log(msg, type = 'info') {
  const div = document.createElement('div');
  div.className = `entry ${type}`;
  div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  document.getElementById('log').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

// ── Connection UI ──────────────────────────────────────────────────────────

/**
 * Update the UI to reflect connection state.
 * Enables/disables all action buttons when connected/disconnected.
 *
 * @param {boolean} state - true if connected, false if disconnected.
 */
function setConnected(state) {
  connected = state;
  document.getElementById('statusDot').className = `status ${state ? 'connected' : 'disconnected'}`;
  document.getElementById('statusText').textContent = state ? 'Connected' : 'Disconnected';
  document.querySelectorAll('#controls button:not(#btnConnect)').forEach(b => b.disabled = !state);
}

// ── Extension ID Detection ─────────────────────────────────────────────────

/**
 * Try to discover or prompt for the Screen Agent extension ID.
 *
 * Chrome does not expose extension IDs to web pages, so we:
 *   1. Check localStorage for a previously saved ID.
 *   2. If not found, show an inline text input for the user to paste the ID.
 *   3. On input change, persist the ID to localStorage.
 *
 * @returns {Promise<string|null>} The extension ID, or null if not yet provided.
 */
async function detectExtensionId() {
  const stored = localStorage.getItem('screenAgentExtId');
  if (stored) {
    document.getElementById('extId').textContent = stored;
    return stored;
  }

  log('Extension ID not cached. Go to chrome://extensions, find "Screen Agent", and copy the ID.', 'error');
  log('Paste it here and click Connect again. Or enter it below:', 'info');

  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'Paste extension ID here';
  input.style.cssText = 'width:300px;padding:6px;margin:8px;background:#0d0d1a;color:#e0e0e0;border:1px solid #7b68ee;border-radius:4px;';
  input.onchange = () => {
    localStorage.setItem('screenAgentExtId', input.value);
    document.getElementById('extId').textContent = input.value;
    log('Extension ID saved: ' + input.value, 'success');
  };
  document.getElementById('log').appendChild(input);
  return null;
}

// ── Connection ─────────────────────────────────────────────────────────────

/**
 * Connect to the Screen Agent extension via chrome.runtime.connectExternal.
 *
 * The extension's externally_connectable manifest allows connections from
 * localhost:* URLs. Once connected, action buttons become enabled and
 * messages sent via port.postMessage() are routed to background.js's
 * onConnectExternal handler (see background.js lines 114-185).
 *
 * Edge cases handled:
 *   - No cached extension ID → prompts user with detectExtensionId()
 *   - Connection fails → logs the error with troubleshooting hints
 *   - Port disconnects → clears port, disables buttons, logs warning
 */
async function connect() {
  let extId = localStorage.getItem('screenAgentExtId');
  if (!extId) {
    extId = await detectExtensionId();
    if (!extId) {
      extId = prompt('Enter Screen Agent extension ID (from chrome://extensions):');
      if (extId) {
        localStorage.setItem('screenAgentExtId', extId);
        document.getElementById('extId').textContent = extId;
      } else {
        return;
      }
    }
  }

  document.getElementById('extId').textContent = extId;

  try {
    port = chrome.runtime.connect(extId, { name: 'test-harness' });

    port.onMessage.addListener((msg) => {
      log('← Response: ' + JSON.stringify(msg).substring(0, 300), msg.ok ? 'success' : 'error');
    });

    port.onDisconnect.addListener(() => {
      log('Port disconnected. The extension may have been reloaded or the tab closed.', 'error');
      setConnected(false);
      port = null;
    });

    setConnected(true);
    log('Connected to Screen Agent extension!', 'success');
  } catch (err) {
    log('Connection failed: ' + err.message, 'error');
    log('Make sure: 1) Extension is loaded 2) ID is correct 3) Page is served from localhost', 'error');
  }
}

// ── Message Sending ────────────────────────────────────────────────────────

/**
 * Send an action message to the extension over the connected port.
 *
 * Guards against sending when not connected — logs an error and returns
 * early rather than throwing.
 *
 * @param {object} msg - The action message, e.g. { action: "get_elements" }.
 */
function send(msg) {
  if (!port || !connected) {
    log('Not connected! Click "Connect to Extension" first.', 'error');
    return;
  }
  log('→ Sending: ' + JSON.stringify(msg), 'info');
  port.postMessage(msg);
}

// ── Tool-Specific Actions ──────────────────────────────────────────────────

/**
 * Request all interactive DOM elements from the active tab.
 *
 * Corresponds to the Screen Agent's extractPageElements() which injects
 * a DOM crawler via chrome.debugger Runtime.evaluate. Returns elements
 * with bounding boxes, text, and interactivity metadata.
 */
function getElements() {
  send({ action: 'get_elements' });
}

/**
 * Capture a screenshot of the active tab.
 *
 * Uses chrome.debugger Page.captureScreenshot. Returns base64-encoded
 * image data with MIME type (typically image/png).
 */
function takeScreenshot() {
  send({ action: 'screenshot' });
}

/**
 * Demo: get elements first, then click the first returned element.
 *
 * This simulates the Screen Agent's click_element tool which looks up
 * an element by its index in the extracted page elements list, computes
 * its center coordinates (cx = x + w/2, cy = y + h/2), and dispatches
 * a CDP Input.dispatchMouseEvent at that point.
 *
 * The 2-second delay between getElements and clickElement gives the
 * extension time to complete the debugger attach/extract/detach cycle.
 */
function clickChessPiece() {
  log('Getting elements first to find clickable items…', 'info');
  send({ action: 'get_elements' });

  setTimeout(() => {
    log('Attempting click_element on index 0 (first element)', 'info');
    send({ action: 'click_element', index: 0 });
  }, 2000);
}

// ── Full Test Suite ────────────────────────────────────────────────────────

/**
 * Run a 3-step integration test that validates the entire tool pipeline.
 *
 * Steps:
 *   1. get_elements — verifies DOM element extraction works
 *   2. screenshot   — verifies Page.captureScreenshot works
 *   3. click_coords — verifies coordinate-based clicking works
 *      (targets e2 pawn center on lichess 512px board at ~302,476)
 *
 * Designed to be run with lichess.org/analysis open in the active tab.
 * Each step has a pause to let the extension complete its debugger
 * attach/execute/detach cycle before the next request.
 */
async function runFullTest() {
  log('═══════════════════════════════════', 'info');
  log('🧪 FULL TEST: Screen Agent Click', 'info');
  log('═══════════════════════════════════', 'info');

  log('Step 1/3: Getting page elements…', 'info');
  send({ action: 'get_elements' });
  await sleep(2000);

  log('Step 2/3: Taking screenshot…', 'info');
  send({ action: 'screenshot' });
  await sleep(2000);

  log('Step 3/3: Clicking by coordinate (e2 pawn on lichess board)…', 'info');
  send({ action: 'click_coords', x: 302, y: 476 });
  await sleep(3000);

  log('═══════════════════════════════════', 'info');
  log('Test complete! Check the lichess board for the selected e2 pawn.', 'success');
  log('═══════════════════════════════════', 'info');
}

/**
 * Promise-based delay, useful for pacing async action sequences.
 *
 * @param {number} ms - Milliseconds to wait.
 * @returns {Promise<void>}
 */
function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ── Initialization ─────────────────────────────────────────────────────────

/**
 * On page load: check for a cached extension ID and guide the user.
 *
 * If a saved ID exists, shows it and prompts to connect. Otherwise,
 * lists the manual setup steps (open chrome://extensions, copy ID, connect).
 */
(async () => {
  const cached = localStorage.getItem('screenAgentExtId');
  if (cached) {
    document.getElementById('extId').textContent = cached;
    log('Cached extension ID found: ' + cached, 'info');
    log('Click "Connect to Extension" to begin.', 'info');
  } else {
    log('No cached extension ID.', 'info');
    log('Steps: 1) Open chrome://extensions 2) Find "Screen Agent" 3) Copy the ID 4) Click Connect', 'info');
  }
})();
</script>
</body>
</html>
